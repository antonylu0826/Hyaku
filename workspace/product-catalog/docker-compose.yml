services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hayku
      POSTGRES_PASSWORD: hayku
      POSTGRES_DB: hayku_product_catalog
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hayku -d hayku_product_catalog"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
