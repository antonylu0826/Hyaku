# ============================================================
# Hayku — 全服務部署配置（自動產生，勿手動修改）
# 產生時間：2026-03-23T07:12:28.688Z
# 重新產生：node .hayku/tools/generated/deployer/tool.mjs generate
# ============================================================

x-service-defaults: &service-defaults
  build:
    context: .
    dockerfile: docker/Dockerfile
  restart: unless-stopped
  env_file:
    - .env
  depends_on:
    db:
      condition: service_healthy

services:
  # ── Database ──────────────────────────────────────────
  db:
    image: postgres:17-alpine
    container_name: hayku-db
    environment:
      POSTGRES_USER: ${DB_USER:-hayku}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hayku123}
      POSTGRES_DB: hayku_identity
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hayku}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Infrastructure Services ───────────────────────────

  hayku-identity:
    <<: *service-defaults
    container_name: hayku-identity
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: hayku-identity
    ports:
      - "3100:3100"
    environment:
      PORT: 3100
      DATABASE_URL: postgres://${DB_USER:-hayku}:${DB_PASSWORD:-hayku123}@db:5432/hayku_identity
      JWT_SECRET: ${JWT_SECRET:-hayku-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
    depends_on:
      db:
        condition: service_healthy

  hayku-audit:
    <<: *service-defaults
    container_name: hayku-audit
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        SERVICE: hayku-audit
    ports:
      - "3200:3200"
    environment:
      PORT: 3200
      DATABASE_URL: postgres://${DB_USER:-hayku}:${DB_PASSWORD:-hayku123}@db:5432/hayku_audit
      JWT_SECRET: ${JWT_SECRET:-hayku-dev-secret-change-in-production}
      IDENTITY_SERVICE_URL: http://hayku-identity:3100
    depends_on:
      db:
        condition: service_healthy
      hayku-identity:
        condition: service_started

volumes:
  pgdata:
